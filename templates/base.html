<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}工作管理工具{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>

<body>

    {% include 'navbar.html' %}

    <!-- 側邊欄 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMenu()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">選單</span>
            <button class="sidebar-close" onclick="toggleMenu()">✕</button>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link active">工作列表</a>
            <a href="#" class="sidebar-link">工作細項規劃</a>
        </nav>
    </aside>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {% if error %}
    <script>
        alert("{{ error }}");
    </script>
    {% endif %}

    <script>
        window.CSRF_TOKEN = "{{ session.csrf_token }}";
    </script>
    <script src="{{ url_for('static', filename='js/csrf.js') }}"></script>

    {% block scripts %}{% endblock %}

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
    </script>
</body>

</html>
