<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}工作管理{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/hamburger.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/buttons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/forms.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/cards.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/typography.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/utilities.css') }}">
    {% block head %}{% endblock %}
</head>

<body>

    {% include 'navbar.html' %}

    <!-- 側邊欄 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMenu()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">選單</span>
            <button class="sidebar-close" onclick="toggleMenu()">✕</button>
        </div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('index.task_list') }}" class="sidebar-link">首頁</a>
            <a href="{{ url_for('progress.tracking.index') }}" class="sidebar-link">代辦事項進度追蹤</a>
            <a href="{{ url_for('progress.completed.index') }}" class="sidebar-link">已完成項目</a>
            <a href="{{ url_for('progress.pending.index') }}" class="sidebar-link">停滯項目</a>
            <a href="{{ url_for('weekly.index') }}" class="sidebar-link">當週進度</a>
            <a href="{{ url_for('auth.index') }}" class="sidebar-link">登出</a>
        </nav>
    </aside>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {% if error %}
    <script>
        alert("{{ error }}");
    </script>
    {% endif %}

    <script>
        window.CSRF_TOKEN = "{{ session.csrf_token }}";
    </script>
    <script src="{{ url_for('static', filename='js/csrf.js') }}"></script>

    {% block scripts %}{% endblock %}

    <script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
    <script src="{{ url_for('static', filename='js/confirm_delete.js') }}"></script>

    <footer class="site-footer">
        <div class="logo-credit">
            Logo通過
            <a href="https://www.designevo.com/tw/" title="免費線上logo製作軟體">
                DesignEvo
            </a>
            設計製作
        </div>
    </footer>
</body>

</html>
