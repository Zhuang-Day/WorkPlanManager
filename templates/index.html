<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8">
    <title>工作管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/notes.css') }}">
</head>

<body>
    <h1>Notes</h1>
    <form action="{{ url_for('add_note') }}" method="post">
        <input type="text" name="content" required placeholder="輸入筆記內容…" autocomplete="off">
        <button type="submit" class="btn btn-primary">新增</button>
    </form>

    {# ── Notes Table ── #}
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>內容</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for n in notes %}
            <tr>
                <td>{{ n[0] }}</td>
                <td>{{ n[1] }}</td>
                <td>
                    <form action="{{ url_for('delete_note', note_id=n[0]) }}" method="post">
                        <button type="submit" class="btn btn-danger">刪除</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" class="empty-msg">目前沒有資料</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
