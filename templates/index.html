<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Task Manager</title>
</head>
<body>

<h2>新增任務</h2>

<form action="/add" method="post">
  <input name="title" placeholder="任務名稱" required><br><br>

  <textarea name="description" placeholder="描述"></textarea><br><br>

  <label>狀態</label><br>
  <select name="status">
    <option value="todo">待做</option>
    <option value="doing">進行中</option>
    <option value="done">完成</option>
  </select><br><br>

  <label>開始時間</label><br>
  <input name="start_at" type="datetime-local" required><br><br>

  <label>結束時間</label><br>
  <input name="end_at" type="datetime-local" required><br><br>

  <label>進度</label><br>
  <input name="progress" type="number" min="0" max="100" value="0"><br><br>

  <button type="submit">新增</button>
</form>

<hr>

<h2>任務列表</h2>

{% for task in tasks %}
  <div>
    <h3>{{ task[1] }}</h3>
    <p>{{ task[2] }}</p>

    <p>狀態：{{ task[3] }}</p>
    <p>時間：{{ task[4] }} ~ {{ task[5] }}</p>
    <p>進度：{{ task[6] }}%</p>

    <progress value="{{ task[6] }}" max="100"></progress>

    <form action="/update/{{ task[0] }}" method="post">
      <input type="number" name="progress" min="0" max="100" value="{{ task[6] }}">
      <button type="submit">更新進度</button>
    </form>

    <a href="/delete/{{ task[0] }}">刪除</a>

    <hr>
  </div>
{% endfor %}

</body>
</html>
