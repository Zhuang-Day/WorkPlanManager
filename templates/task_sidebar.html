<!-- 右側側欄 -->
<div id="task-sidebar" class="task-sidebar">
    <div class="sidebar-header">
        <h3 class="sidebar-title">任務細節</h3>
        <button id="close-sidebar" class="btn btn-sm">關閉</button>
    </div>
    <form id="sidebar-form" method="POST" action="">
        <div class="sidebar-content">
            <!-- CSRF 隱藏欄位 -->
            <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
            <div class="form-group">
                <label class="task-label" for="sidebar-title">標題:</label>
                <input type="text" id="sidebar-title" name="title" style="width:100%;">
            </div>

            <div class="form-group">
                <label class="task-label" for="sidebar-start">開始日期:</label>
                <input type="date" id="sidebar-start" name="start_at">
            </div>

            <div class="form-group">
                <label class="task-label" for="sidebar-end">結束日期:</label>
                <input type="date" id="sidebar-end" name="end_at">
            </div>

            <div class="form-group progress-group">
                <span class="task-label">進度:</span>
                <input type="range" id="sidebar-progress-slider" name="progress" min="0" max="100">
                <input type="number" id="sidebar-progress-number" class="progress-number-input" min="0" max="100">
                <span class="task-label">%</span>
            </div>

            <div class="form-group">
                <label class="task-label" for="sidebar-status">狀態:</label>
                <select id="sidebar-status" name="status">
                    <option value="todo">Todo</option>
                    <option value="doing">Doing</option>
                    <option value="done">Done</option>
                    <option value="pending">Pending</option>
                </select>
            </div>

            <div class="form-group">
                <label class="task-label" for="sidebar-description">描述:</label>
                <textarea id="sidebar-description" name="description" rows="4" style="width:100%;"></textarea>
            </div>
        </div>
        <div style="margin-top:20px;">
            <button type="submit" class="btn btn-primary" id="sidebar-save-btn">保存</button>
        </div>
    </form>
</div>
